console_title_template = "{{ .Folder }}"
version = 3

[transient_prompt]
background = "transparent"
foreground = "#cccccc"
template = "{{ now | date \"15:04:05\" }} {{ if gt .Code 0 }}\u001b[38;2;224;108;117m✗{{ else }}\u001b[38;2;152;195;121m✓{{ end }} \u001b[38;2;224;108;117m❯\u001b[0m "

[[blocks]]
type = "prompt"
alignment = "left"

[[blocks.segments]]
type = "path"
style = "plain"
foreground = "#99ffaa"
template = "{{ .Path }}{{ if not .Writable }}🔒 {{ end }}"
foreground_templates = [
    "{{ if gt .Code 0 }}#ff9999{{ end }}"
]

[blocks.segments.properties]
cache_duration = "none"
folder_icon = "🔒"
folder_separator_icon = "/"
style = "full"

